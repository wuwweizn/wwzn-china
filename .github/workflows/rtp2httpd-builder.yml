name: Build and Push rtp2httpd (Multi-Arch, GHCR)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "rtp2httpd 版本号（留空则使用 config.yaml 中的版本）"
        required: false
        default: ""
  push:
    branches:
      - main
    paths:
      - "rtp2httpd/**"
      - ".github/workflows/rtp2httpd-builder.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            build_arch: amd64
          - arch: arm64
            platform: linux/arm64
            build_arch: aarch64
          - arch: armv7
            platform: linux/arm/v7
            build_arch: armv7

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - name: Get lowercase repo owner
        run: echo "REPO_OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Extract VERSION from config or input
        id: extract_version
        run: |
          ADDON_DIR="rtp2httpd"
          CONFIG_PATH="${ADDON_DIR}/config.yaml"

          # 优先使用手动触发时的 input 版本
          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [[ -n "$INPUT_VERSION" ]]; then
            VERSION="$INPUT_VERSION"
            echo "💡 使用手动输入版本: $VERSION"
          elif [[ -f "$CONFIG_PATH" ]]; then
            VERSION=$(yq e ".version" "$CONFIG_PATH")
            echo "💡 使用 config.yaml 版本: $VERSION"
          else
            echo "❌ ERROR: $CONFIG_PATH not found and no input version!"
            exit 1
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "BUILD_ARCH=${{ matrix.build_arch }}" >> $GITHUB_ENV

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push rtp2httpd for ${{ matrix.arch }}
        uses: docker/build-push-action@v5
        with:
          context: rtp2httpd
          file: rtp2httpd/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_FROM=ghcr.io/stackia/rtp2httpd:${{ env.VERSION }}
          tags: |
            ghcr.io/${{ env.REPO_OWNER_LC }}/rtp2httpd-${{ env.BUILD_ARCH }}:${{ env.VERSION }}
            ghcr.io/${{ env.REPO_OWNER_LC }}/rtp2httpd-${{ env.BUILD_ARCH }}:latest
